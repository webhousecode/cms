<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" fill="none">
  <defs>
    <style>
      .title { font: bold 20px system-ui, sans-serif; fill: #0D0D0D; }
      .step-label { font: bold 13px system-ui, sans-serif; fill: #fff; }
      .step-title { font: bold 15px system-ui, sans-serif; fill: #0D0D0D; }
      .step-desc { font: 13px system-ui, sans-serif; fill: #555; }
      .cmd { font: 12px 'SF Mono', 'Fira Code', monospace; fill: #0D0D0D; }
      .cmd-bg { fill: #F5F5F5; rx: 6; }
      .badge { font: bold 11px system-ui, sans-serif; fill: #fff; }
      .arrow { stroke: #999; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .connector { stroke: #E5E7EB; stroke-width: 2; stroke-dasharray: 6 4; }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#999"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" class="title">WebHouse CMS — From Zero to Published Site</text>

  <!-- Step 1: Scaffold -->
  <g transform="translate(30, 65)">
    <rect width="180" height="140" rx="12" fill="#fff" stroke="#E5E7EB" stroke-width="2"/>
    <rect width="180" height="32" rx="12" fill="#F7BB2E"/>
    <rect y="20" width="180" height="12" fill="#F7BB2E"/>
    <text x="14" y="22" class="step-label">1</text>
    <text x="34" y="22" class="step-label">SCAFFOLD</text>
    <text x="90" y="56" text-anchor="middle" class="step-title">Create Project</text>
    <rect x="10" y="68" width="160" height="22" class="cmd-bg"/>
    <text x="18" y="83" class="cmd">npm create @webhouse/cms</text>
    <text x="90" y="110" text-anchor="middle" class="step-desc">Generates config,</text>
    <text x="90" y="126" text-anchor="middle" class="step-desc">package.json, .env</text>
  </g>

  <!-- Arrow 1→2 -->
  <path d="M 218 135 L 258 135" class="arrow"/>

  <!-- Step 2: Schema -->
  <g transform="translate(265, 65)">
    <rect width="180" height="140" rx="12" fill="#fff" stroke="#E5E7EB" stroke-width="2"/>
    <rect width="180" height="32" rx="12" fill="#F7BB2E"/>
    <rect y="20" width="180" height="12" fill="#F7BB2E"/>
    <text x="14" y="22" class="step-label">2</text>
    <text x="34" y="22" class="step-label">DEFINE SCHEMA</text>
    <text x="90" y="56" text-anchor="middle" class="step-title">cms.config.ts</text>
    <rect x="10" y="68" width="160" height="22" class="cmd-bg"/>
    <text x="18" y="83" class="cmd">defineCollection({...})</text>
    <text x="90" y="110" text-anchor="middle" class="step-desc">Zod-backed fields,</text>
    <text x="90" y="126" text-anchor="middle" class="step-desc">type-safe schema</text>
  </g>

  <!-- Arrow 2→3 -->
  <path d="M 453 135 L 493 135" class="arrow"/>

  <!-- Step 3: Dev -->
  <g transform="translate(500, 65)">
    <rect width="180" height="140" rx="12" fill="#fff" stroke="#E5E7EB" stroke-width="2"/>
    <rect width="180" height="32" rx="12" fill="#F7BB2E"/>
    <rect y="20" width="180" height="12" fill="#F7BB2E"/>
    <text x="14" y="22" class="step-label">3</text>
    <text x="34" y="22" class="step-label">DEVELOP</text>
    <text x="90" y="56" text-anchor="middle" class="step-title">Dev Server</text>
    <rect x="10" y="68" width="160" height="22" class="cmd-bg"/>
    <text x="18" y="83" class="cmd">npx cms dev</text>
    <text x="90" y="110" text-anchor="middle" class="step-desc">REST API + Admin UI</text>
    <text x="90" y="126" text-anchor="middle" class="step-desc">localhost:3000</text>
  </g>

  <!-- Arrow 3→4 -->
  <path d="M 688 135 L 728 135" class="arrow"/>

  <!-- Step 4: Build -->
  <g transform="translate(735, 65)">
    <rect width="140" height="140" rx="12" fill="#fff" stroke="#E5E7EB" stroke-width="2"/>
    <rect width="140" height="32" rx="12" fill="#0D0D0D"/>
    <rect y="20" width="140" height="12" fill="#0D0D0D"/>
    <text x="14" y="22" class="step-label">4</text>
    <text x="34" y="22" class="step-label">BUILD</text>
    <text x="70" y="56" text-anchor="middle" class="step-title">Static Site</text>
    <rect x="10" y="68" width="120" height="22" class="cmd-bg"/>
    <text x="18" y="83" class="cmd">npx cms build</text>
    <text x="70" y="110" text-anchor="middle" class="step-desc">HTML, sitemap,</text>
    <text x="70" y="126" text-anchor="middle" class="step-desc">llms.txt</text>
  </g>

  <!-- Content Creation Methods (below) -->
  <text x="450" y="250" text-anchor="middle" class="title" font-size="16">Three ways to create content</text>

  <!-- Connector from Step 3 down -->
  <path d="M 590 205 L 590 230" class="connector"/>
  <path d="M 590 230 L 170 270" class="connector"/>
  <path d="M 590 230 L 450 270" class="connector"/>
  <path d="M 590 230 L 730 270" class="connector"/>

  <!-- Method A: API -->
  <g transform="translate(55, 275)">
    <rect width="230" height="130" rx="12" fill="#fff" stroke="#E5E7EB" stroke-width="2"/>
    <rect x="8" y="8" width="26" height="20" rx="4" fill="#2563eb"/>
    <text x="21" y="23" text-anchor="middle" class="badge">A</text>
    <text x="44" y="23" class="step-title">REST API</text>
    <rect x="10" y="38" width="210" height="22" class="cmd-bg"/>
    <text x="18" y="53" class="cmd">curl -X POST /api/content/posts</text>
    <text x="115" y="80" text-anchor="middle" class="step-desc">Create documents directly</text>
    <text x="115" y="96" text-anchor="middle" class="step-desc">via HTTP — any client/script</text>
    <rect x="55" y="105" width="120" height="18" rx="4" fill="#EFF6FF"/>
    <text x="115" y="117" text-anchor="middle" class="cmd" fill="#2563eb">Programmatic</text>
  </g>

  <!-- Method B: AI Generate -->
  <g transform="translate(335, 275)">
    <rect width="230" height="130" rx="12" fill="#fff" stroke="#F7BB2E" stroke-width="2"/>
    <rect x="8" y="8" width="26" height="20" rx="4" fill="#F7BB2E"/>
    <text x="21" y="23" text-anchor="middle" class="badge" fill="#0D0D0D">B</text>
    <text x="44" y="23" class="step-title">AI Generate</text>
    <rect x="10" y="38" width="210" height="22" class="cmd-bg"/>
    <text x="18" y="53" class="cmd">npx cms ai generate posts "..."</text>
    <text x="115" y="80" text-anchor="middle" class="step-desc">AI writes content from prompt</text>
    <text x="115" y="96" text-anchor="middle" class="step-desc">Claude Sonnet · $0.01/post</text>
    <rect x="55" y="105" width="120" height="18" rx="4" fill="#FFFBEB"/>
    <text x="115" y="117" text-anchor="middle" class="cmd" fill="#92400E">AI-powered</text>
  </g>

  <!-- Method C: Claude Code -->
  <g transform="translate(615, 275)">
    <rect width="230" height="130" rx="12" fill="#fff" stroke="#E5E7EB" stroke-width="2"/>
    <rect x="8" y="8" width="26" height="20" rx="4" fill="#0D0D0D"/>
    <text x="21" y="23" text-anchor="middle" class="badge">C</text>
    <text x="44" y="23" class="step-title">Claude Code</text>
    <rect x="10" y="38" width="210" height="22" class="cmd-bg"/>
    <text x="18" y="53" class="cmd">"Build me a blog with 2 posts"</text>
    <text x="115" y="80" text-anchor="middle" class="step-desc">AI edits config, creates</text>
    <text x="115" y="96" text-anchor="middle" class="step-desc">content, runs build for you</text>
    <rect x="55" y="105" width="120" height="18" rx="4" fill="#F5F5F5"/>
    <text x="115" y="117" text-anchor="middle" class="cmd" fill="#333">Full autopilot</text>
  </g>

  <!-- Output section -->
  <g transform="translate(120, 435)">
    <rect width="660" height="65" rx="12" fill="#FAFAFA" stroke="#E5E7EB" stroke-width="1.5"/>
    <text x="330" y="25" text-anchor="middle" class="step-title">Build Output</text>
    <text x="80" y="48" text-anchor="middle" class="cmd">index.html</text>
    <text x="195" y="48" text-anchor="middle" class="cmd">posts/*.html</text>
    <text x="310" y="48" text-anchor="middle" class="cmd">sitemap.xml</text>
    <text x="425" y="48" text-anchor="middle" class="cmd">llms.txt</text>
    <text x="555" y="48" text-anchor="middle" class="cmd">ai-plugin.json</text>
  </g>

  <!-- Connectors from methods to output -->
  <path d="M 170 405 L 330 435" class="connector"/>
  <path d="M 450 405 L 450 435" class="connector"/>
  <path d="M 730 405 L 570 435" class="connector"/>
</svg>
