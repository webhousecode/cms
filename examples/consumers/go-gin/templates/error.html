<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ .StatusCode }} — {{ if .Globals }}{{ .Globals.StringOr "brandPrefix" "@webhouse/cms" }}{{ else }}@webhouse/cms{{ end }}</title>
    <style>{{ template "style.css" . }}</style>
</head>
<body>
    {{ template "nav.html" . }}
    <div style="text-align: center; padding: 4rem 0;">
        <h1 style="font-size: 5rem; color: var(--gold); font-family: 'JetBrains Mono', monospace;">{{ .StatusCode }}</h1>
        <h2 style="margin-top: 1rem;">{{ .StatusText }}</h2>
        <p style="margin-top: 2rem;"><a href="/" class="back">← Back to all posts</a></p>
    </div>
    {{ template "footer.html" . }}
</body>
</html>
