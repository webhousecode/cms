<svg viewBox="20 30 800 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Three filters on the gate: candidate queue flows through trusted pipeline, confidence threshold, and no-contradictions checks into a Neuron">
  <!-- Candidate queue (left) -->
  <g fill="none" stroke="currentColor" stroke-width="1">
    <rect x="40"  y="170" width="70" height="18"/>
    <rect x="40"  y="195" width="70" height="18"/>
    <rect x="40"  y="220" width="70" height="18"/>
    <rect x="40"  y="245" width="70" height="18"/>
    <rect x="40"  y="270" width="70" height="18"/>
  </g>
  <g stroke="currentColor" stroke-width="0.5" opacity="0.5">
    <line x1="50" y1="180" x2="95" y2="180"/>
    <line x1="50" y1="205" x2="95" y2="205"/>
    <line x1="50" y1="230" x2="85" y2="230"/>
    <line x1="50" y1="255" x2="92" y2="255"/>
    <line x1="50" y1="280" x2="88" y2="280"/>
  </g>
  <text x="75" y="160" font-family="monospace" font-size="9" fill="currentColor" text-anchor="middle" font-weight="bold" letter-spacing="0.5">CANDIDATES</text>
  <text x="75" y="305" font-family="monospace" font-size="8" fill="currentColor" text-anchor="middle" opacity="0.55">proposed by LLM</text>

  <!-- Three sequential gates (dashed vertical lines) -->
  <g stroke="currentColor" stroke-width="1.2" stroke-dasharray="5,4">
    <line x1="220" y1="130" x2="220" y2="320"/>
    <line x1="390" y1="130" x2="390" y2="320"/>
    <line x1="560" y1="130" x2="560" y2="320"/>
  </g>

  <!-- Gate labels (above each) -->
  <g font-family="monospace" fill="currentColor" text-anchor="middle">
    <text x="220" y="110" font-size="10" font-weight="bold" letter-spacing="0.5">FILTER · 1</text>
    <text x="220" y="122" font-size="9" letter-spacing="0.5">TRUSTED PIPELINE</text>
    <text x="220" y="340" font-size="8" opacity="0.55">deletion</text>
    <text x="390" y="110" font-size="10" font-weight="bold" letter-spacing="0.5">FILTER · 2</text>
    <text x="390" y="122" font-size="9" letter-spacing="0.5">CONFIDENCE ≥ Θ</text>
    <text x="390" y="340" font-size="8" opacity="0.55">generalisation</text>
    <text x="560" y="110" font-size="10" font-weight="bold" letter-spacing="0.5">FILTER · 3</text>
    <text x="560" y="122" font-size="9" letter-spacing="0.5">NO CONTRADICTIONS</text>
    <text x="560" y="340" font-size="8" opacity="0.55">distortion</text>
  </g>

  <!-- Rejected-outlet arrows at each gate (pointing down to curator) -->
  <g stroke="currentColor" stroke-width="0.7" fill="none" opacity="0.6">
    <line x1="220" y1="320" x2="220" y2="370"/>
    <polygon points="220,375 216,368 224,368" fill="currentColor"/>
    <line x1="390" y1="320" x2="390" y2="370"/>
    <polygon points="390,375 386,368 394,368" fill="currentColor"/>
    <line x1="560" y1="320" x2="560" y2="370"/>
    <polygon points="560,375 556,368 564,368" fill="currentColor"/>
  </g>

  <!-- Curator queue (bottom, spans across) -->
  <rect x="160" y="385" width="460" height="22" fill="none" stroke="currentColor" stroke-width="0.8" stroke-dasharray="3,3"/>
  <text x="390" y="400" font-family="monospace" font-size="9" fill="currentColor" text-anchor="middle" letter-spacing="0.5">CURATOR REVIEW</text>

  <!-- Amber path: one candidate flowing through all three gates into a Neuron -->
  <g stroke="#e8a87c" stroke-width="1.8" fill="none">
    <path d="M 110 229 L 220 229"/>
    <path d="M 220 229 L 390 229"/>
    <path d="M 390 229 L 560 229"/>
    <path d="M 560 229 L 700 229"/>
  </g>
  <!-- Amber nodes at each gate crossing -->
  <g fill="#e8a87c">
    <circle cx="220" cy="229" r="4"/>
    <circle cx="390" cy="229" r="4"/>
    <circle cx="560" cy="229" r="4"/>
    <circle cx="700" cy="229" r="6"/>
  </g>
  <g fill="none" stroke="#e8a87c" stroke-width="0.6" opacity="0.5">
    <circle cx="220" cy="229" r="9"/>
    <circle cx="390" cy="229" r="9"/>
    <circle cx="560" cy="229" r="9"/>
    <circle cx="700" cy="229" r="12"/>
  </g>
  <g fill="none" stroke="#e8a87c" stroke-width="0.4" opacity="0.3">
    <circle cx="700" cy="229" r="18"/>
  </g>

  <!-- Wiki destination (right) -->
  <g fill="none" stroke="currentColor" stroke-width="1.2">
    <rect x="710" y="170" width="90" height="120"/>
  </g>
  <g stroke="currentColor" stroke-width="0.5" opacity="0.5">
    <line x1="720" y1="205" x2="790" y2="205"/>
    <line x1="720" y1="220" x2="785" y2="220"/>
    <line x1="720" y1="245" x2="790" y2="245"/>
    <line x1="720" y1="260" x2="780" y2="260"/>
    <line x1="720" y1="275" x2="788" y2="275"/>
  </g>
  <text x="755" y="160" font-family="monospace" font-size="9" fill="currentColor" text-anchor="middle" font-weight="bold" letter-spacing="0.5">NEURON</text>
  <text x="755" y="305" font-family="monospace" font-size="8" fill="currentColor" text-anchor="middle" opacity="0.55">persistent</text>

  <!-- Caption -->
  <text x="420" y="70" font-family="monospace" font-size="11" fill="currentColor" text-anchor="middle" opacity="0.55" letter-spacing="1.5">THREE FILTERS ON THE GATE</text>
  <text x="420" y="85" font-family="monospace" font-size="9"  fill="currentColor" text-anchor="middle" opacity="0.4">every candidate passes all three — or goes to a human</text>
</svg>
