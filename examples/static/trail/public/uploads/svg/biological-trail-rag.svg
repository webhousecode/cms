<svg viewBox="20 30 800 490" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Comparison of biological memory processes with Trail's compile-time architecture and RAG's retrieval-time architecture across seven cognitive functions">
  <!-- Caption (top) -->
  <text x="420" y="55" font-family="monospace" font-size="11" fill="currentColor" text-anchor="middle" opacity="0.55" letter-spacing="1.5">HOW THE BRAIN REMEMBERS · TRAIL · RAG</text>

  <!-- Column headers -->
  <g font-family="monospace" fill="currentColor" text-anchor="middle">
    <text x="160" y="95"  font-size="10" font-weight="bold" letter-spacing="1">BIOLOGICAL</text>
    <text x="160" y="108" font-size="8"  opacity="0.55">what the brain does</text>
    <text x="440" y="95"  font-size="10" font-weight="bold" letter-spacing="1" fill="#e8a87c">TRAIL</text>
    <text x="440" y="108" font-size="8"  opacity="0.55">compile-time</text>
    <text x="690" y="95"  font-size="10" font-weight="bold" letter-spacing="1">RAG</text>
    <text x="690" y="108" font-size="8"  opacity="0.55">retrieve-time</text>
  </g>

  <!-- Header underline -->
  <line x1="40" y1="120" x2="800" y2="120" stroke="currentColor" stroke-width="0.8" opacity="0.5"/>

  <!-- Column dividers (subtle vertical lines) -->
  <g stroke="currentColor" stroke-width="0.5" opacity="0.2">
    <line x1="300" y1="120" x2="300" y2="440"/>
    <line x1="570" y1="120" x2="570" y2="440"/>
  </g>

  <!-- Row 1: Ingestion -->
  <g font-family="monospace" fill="currentColor" text-anchor="middle">
    <text x="160" y="148" font-size="9">Hippocampus encodes</text>
    <text x="160" y="160" font-size="9">new experience</text>
    <text x="440" y="154" font-size="9">Source ingestion</text>
    <text x="690" y="154" font-size="9">Document ingestion</text>
  </g>
  <!-- connector: biological → trail (amber, equivalence) -->
  <g stroke="#e8a87c" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.7">
    <line x1="268" y1="154" x2="340" y2="154"/>
    <line x1="540" y1="154" x2="612" y2="154"/>
  </g>

  <line x1="40" y1="178" x2="800" y2="178" stroke="currentColor" stroke-width="0.3" opacity="0.2"/>

  <!-- Row 2: Consolidation -->
  <g font-family="monospace" fill="currentColor" text-anchor="middle">
    <text x="160" y="202" font-size="9">Consolidation transfers</text>
    <text x="160" y="214" font-size="9">knowledge to neocortex</text>
    <text x="440" y="202" font-size="9">Compile step writes</text>
    <text x="440" y="214" font-size="9">or updates Neurons</text>
    <text x="690" y="208" font-size="9" font-style="italic" opacity="0.4">(does not exist)</text>
  </g>
  <g stroke="#e8a87c" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.7">
    <line x1="268" y1="208" x2="340" y2="208"/>
  </g>
  <line x1="540" y1="208" x2="612" y2="208" stroke="currentColor" stroke-width="0.5" opacity="0.25"/>

  <line x1="40" y1="232" x2="800" y2="232" stroke="currentColor" stroke-width="0.3" opacity="0.2"/>

  <!-- Row 3: Long-term store -->
  <g font-family="monospace" fill="currentColor" text-anchor="middle">
    <text x="160" y="256" font-size="9">Neocortex stores integrated</text>
    <text x="160" y="268" font-size="9">long-term knowledge</text>
    <text x="440" y="262" font-size="9">Neurons</text>
    <text x="690" y="262" font-size="9" font-style="italic" opacity="0.4">(does not exist)</text>
  </g>
  <g stroke="#e8a87c" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.7">
    <line x1="268" y1="262" x2="340" y2="262"/>
  </g>
  <line x1="540" y1="262" x2="612" y2="262" stroke="currentColor" stroke-width="0.5" opacity="0.25"/>

  <line x1="40" y1="286" x2="800" y2="286" stroke="currentColor" stroke-width="0.3" opacity="0.2"/>

  <!-- Row 4: Recall -->
  <g font-family="monospace" fill="currentColor" text-anchor="middle">
    <text x="160" y="310" font-size="9">Recall activates</text>
    <text x="160" y="322" font-size="9">an existing pattern</text>
    <text x="440" y="316" font-size="9">Read the Neuron</text>
    <text x="690" y="310" font-size="9" font-style="italic" opacity="0.55">Reconstruct from</text>
    <text x="690" y="322" font-size="9" font-style="italic" opacity="0.55">scratch every query</text>
  </g>
  <g stroke="#e8a87c" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.7">
    <line x1="268" y1="316" x2="340" y2="316"/>
  </g>
  <line x1="540" y1="316" x2="612" y2="316" stroke="currentColor" stroke-width="0.5" opacity="0.25"/>

  <line x1="40" y1="340" x2="800" y2="340" stroke="currentColor" stroke-width="0.3" opacity="0.2"/>

  <!-- Row 5: Spreading activation -->
  <g font-family="monospace" fill="currentColor" text-anchor="middle">
    <text x="160" y="364" font-size="9">Spreading activation finds</text>
    <text x="160" y="376" font-size="9">related knowledge</text>
    <text x="440" y="370" font-size="9">Follow Neuron links</text>
    <text x="690" y="364" font-size="9">Vector similarity</text>
    <text x="690" y="376" font-size="9" opacity="0.55">(weak parallel)</text>
  </g>
  <g stroke="#e8a87c" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.7">
    <line x1="268" y1="370" x2="340" y2="370"/>
    <line x1="540" y1="370" x2="612" y2="370"/>
  </g>

  <line x1="40" y1="394" x2="800" y2="394" stroke="currentColor" stroke-width="0.3" opacity="0.2"/>

  <!-- Row 6: Sleep consolidation -->
  <g font-family="monospace" fill="currentColor" text-anchor="middle">
    <text x="160" y="418" font-size="9">Sleep consolidates</text>
    <text x="160" y="430" font-size="9">the day's learning</text>
    <text x="440" y="424" font-size="9">Background lint pass</text>
    <text x="690" y="424" font-size="9" font-style="italic" opacity="0.4">(does not exist)</text>
  </g>
  <g stroke="#e8a87c" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.7">
    <line x1="268" y1="424" x2="340" y2="424"/>
  </g>
  <line x1="540" y1="424" x2="612" y2="424" stroke="currentColor" stroke-width="0.5" opacity="0.25"/>

  <line x1="40" y1="448" x2="800" y2="448" stroke="currentColor" stroke-width="0.3" opacity="0.2"/>

  <!-- Row 7: Forgetting -->
  <g font-family="monospace" fill="currentColor" text-anchor="middle">
    <text x="160" y="472" font-size="9">Forgetting prunes</text>
    <text x="160" y="484" font-size="9">the irrelevant</text>
    <text x="440" y="478" font-size="9">Stale-Neuron detection</text>
    <text x="690" y="478" font-size="9" font-style="italic" opacity="0.4">(does not exist)</text>
  </g>
  <g stroke="#e8a87c" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.7">
    <line x1="268" y1="478" x2="340" y2="478"/>
  </g>
  <line x1="540" y1="478" x2="612" y2="478" stroke="currentColor" stroke-width="0.5" opacity="0.25"/>

  <!-- Bottom sub-caption -->
  <text x="420" y="510" font-family="monospace" font-size="9" fill="currentColor" text-anchor="middle" opacity="0.4">seven things a brain does · Trail does six · RAG does one</text>
</svg>
