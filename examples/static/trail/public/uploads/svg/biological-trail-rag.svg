<svg viewBox="0 0 840 660" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Comparison of biological memory processes with Trail's compile-time architecture and RAG's retrieval-time architecture across seven cognitive functions">
  <!-- Title -->
  <text x="420" y="38" font-family="monospace" font-size="14" fill="currentColor" text-anchor="middle" opacity="0.6" letter-spacing="1.5">HOW THE BRAIN REMEMBERS · TRAIL · RAG</text>

  <!-- Column headers -->
  <g font-family="monospace" fill="currentColor" text-anchor="middle">
    <text x="160" y="85"  font-size="16" font-weight="bold" letter-spacing="1">BIOLOGICAL</text>
    <text x="160" y="105" font-size="12" opacity="0.55">what the brain does</text>
    <text x="440" y="85"  font-size="16" font-weight="bold" letter-spacing="1" fill="#e8a87c">TRAIL</text>
    <text x="440" y="105" font-size="12" opacity="0.55">compile-time</text>
    <text x="690" y="85"  font-size="16" font-weight="bold" letter-spacing="1">RAG</text>
    <text x="690" y="105" font-size="12" opacity="0.55">retrieve-time</text>
  </g>

  <!-- Header underline -->
  <line x1="40" y1="125" x2="800" y2="125" stroke="currentColor" stroke-width="1" opacity="0.55"/>

  <!-- Column dividers -->
  <g stroke="currentColor" stroke-width="0.5" opacity="0.18">
    <line x1="300" y1="125" x2="300" y2="620"/>
    <line x1="570" y1="125" x2="570" y2="620"/>
  </g>

  <!-- Row 1: Ingestion -->
  <g font-family="monospace" fill="currentColor" text-anchor="middle">
    <text x="160" y="162" font-size="14">Hippocampus encodes</text>
    <text x="160" y="180" font-size="14">new experience</text>
    <text x="440" y="171" font-size="14">Source ingestion</text>
    <text x="690" y="171" font-size="14">Document ingestion</text>
  </g>
  <line x1="40" y1="205" x2="800" y2="205" stroke="currentColor" stroke-width="0.4" opacity="0.2"/>

  <!-- Row 2: Consolidation -->
  <g font-family="monospace" fill="currentColor" text-anchor="middle">
    <text x="160" y="232" font-size="14">Consolidation transfers</text>
    <text x="160" y="250" font-size="14">knowledge to neocortex</text>
    <text x="440" y="232" font-size="14">Compile step writes</text>
    <text x="440" y="250" font-size="14">or updates Neurons</text>
    <text x="690" y="241" font-size="14" font-style="italic" opacity="0.45">(does not exist)</text>
  </g>
  <line x1="40" y1="275" x2="800" y2="275" stroke="currentColor" stroke-width="0.4" opacity="0.2"/>

  <!-- Row 3: Long-term store -->
  <g font-family="monospace" fill="currentColor" text-anchor="middle">
    <text x="160" y="302" font-size="14">Neocortex stores</text>
    <text x="160" y="320" font-size="14">integrated knowledge</text>
    <text x="440" y="311" font-size="14">Neurons</text>
    <text x="690" y="311" font-size="14" font-style="italic" opacity="0.45">(does not exist)</text>
  </g>
  <line x1="40" y1="345" x2="800" y2="345" stroke="currentColor" stroke-width="0.4" opacity="0.2"/>

  <!-- Row 4: Recall -->
  <g font-family="monospace" fill="currentColor" text-anchor="middle">
    <text x="160" y="372" font-size="14">Recall activates</text>
    <text x="160" y="390" font-size="14">an existing pattern</text>
    <text x="440" y="381" font-size="14">Read the Neuron</text>
    <text x="690" y="372" font-size="14" font-style="italic" opacity="0.6">Reconstruct from</text>
    <text x="690" y="390" font-size="14" font-style="italic" opacity="0.6">scratch every query</text>
  </g>
  <line x1="40" y1="415" x2="800" y2="415" stroke="currentColor" stroke-width="0.4" opacity="0.2"/>

  <!-- Row 5: Spreading activation -->
  <g font-family="monospace" fill="currentColor" text-anchor="middle">
    <text x="160" y="442" font-size="14">Spreading activation</text>
    <text x="160" y="460" font-size="14">finds related items</text>
    <text x="440" y="451" font-size="14">Follow Neuron links</text>
    <text x="690" y="442" font-size="14">Vector similarity</text>
    <text x="690" y="460" font-size="13" opacity="0.6">(weak parallel)</text>
  </g>
  <line x1="40" y1="485" x2="800" y2="485" stroke="currentColor" stroke-width="0.4" opacity="0.2"/>

  <!-- Row 6: Sleep consolidation -->
  <g font-family="monospace" fill="currentColor" text-anchor="middle">
    <text x="160" y="512" font-size="14">Sleep consolidates</text>
    <text x="160" y="530" font-size="14">the day's learning</text>
    <text x="440" y="521" font-size="14">Background lint pass</text>
    <text x="690" y="521" font-size="14" font-style="italic" opacity="0.45">(does not exist)</text>
  </g>
  <line x1="40" y1="555" x2="800" y2="555" stroke="currentColor" stroke-width="0.4" opacity="0.2"/>

  <!-- Row 7: Forgetting -->
  <g font-family="monospace" fill="currentColor" text-anchor="middle">
    <text x="160" y="582" font-size="14">Forgetting prunes</text>
    <text x="160" y="600" font-size="14">the irrelevant</text>
    <text x="440" y="591" font-size="14">Stale-Neuron detection</text>
    <text x="690" y="591" font-size="14" font-style="italic" opacity="0.45">(does not exist)</text>
  </g>

  <!-- Bottom sub-caption -->
  <text x="420" y="645" font-family="monospace" font-size="12" fill="currentColor" text-anchor="middle" opacity="0.5" letter-spacing="0.5">seven things a brain does · Trail does six · RAG does one</text>
</svg>
