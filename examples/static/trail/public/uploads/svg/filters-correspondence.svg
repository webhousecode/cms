<svg viewBox="20 30 800 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Correspondence between Bandler and Grinder's NLP filters, biological brain structures, and Trail's curation filters">
  <!-- Column headers -->
  <g font-family="monospace" fill="currentColor" text-anchor="middle">
    <text x="150" y="80"  font-size="10" font-weight="bold" letter-spacing="1">NLP</text>
    <text x="150" y="94"  font-size="8"  opacity="0.55">Bandler · Grinder · 1975</text>
    <text x="420" y="80"  font-size="10" font-weight="bold" letter-spacing="1">BRAIN</text>
    <text x="420" y="94"  font-size="8"  opacity="0.55">thalamic gate · cortex</text>
    <text x="690" y="80"  font-size="10" font-weight="bold" letter-spacing="1">TRAIL</text>
    <text x="690" y="94"  font-size="8"  opacity="0.55">policy engine</text>
  </g>

  <!-- Header underline -->
  <line x1="60" y1="108" x2="780" y2="108" stroke="currentColor" stroke-width="0.6" opacity="0.35"/>

  <!-- Row 1: Deletion -->
  <g fill="none" stroke="currentColor" stroke-width="1">
    <rect x="60"  y="130" width="180" height="40"/>
    <rect x="330" y="130" width="180" height="40"/>
    <rect x="600" y="130" width="180" height="40"/>
  </g>
  <g font-family="monospace" fill="currentColor" text-anchor="middle">
    <text x="150" y="148" font-size="10" letter-spacing="0.5">DELETION</text>
    <text x="150" y="162" font-size="8"  opacity="0.6">signal admitted or not</text>
    <text x="420" y="148" font-size="10" letter-spacing="0.5">THALAMIC GATE</text>
    <text x="420" y="162" font-size="8"  opacity="0.6">sensory relay · attention</text>
    <text x="690" y="148" font-size="10" letter-spacing="0.5">TRUSTED PIPELINE</text>
    <text x="690" y="162" font-size="8"  opacity="0.6">deletion by provenance</text>
  </g>
  <g stroke="#e8a87c" stroke-width="1" stroke-dasharray="2,2">
    <line x1="240" y1="150" x2="330" y2="150"/>
    <line x1="510" y1="150" x2="600" y2="150"/>
  </g>

  <!-- Row 2: Generalisation -->
  <g fill="none" stroke="currentColor" stroke-width="1">
    <rect x="60"  y="195" width="180" height="40"/>
    <rect x="330" y="195" width="180" height="40"/>
    <rect x="600" y="195" width="180" height="40"/>
  </g>
  <g font-family="monospace" fill="currentColor" text-anchor="middle">
    <text x="150" y="213" font-size="10" letter-spacing="0.5">GENERALISATION</text>
    <text x="150" y="227" font-size="8"  opacity="0.6">priors from past experience</text>
    <text x="420" y="213" font-size="10" letter-spacing="0.5">CORTICAL PRIORS</text>
    <text x="420" y="227" font-size="8"  opacity="0.6">predictive coding · Friston</text>
    <text x="690" y="213" font-size="10" letter-spacing="0.5">CONFIDENCE ≥ Θ</text>
    <text x="690" y="227" font-size="8"  opacity="0.6">signal strength threshold</text>
  </g>
  <g stroke="#e8a87c" stroke-width="1" stroke-dasharray="2,2">
    <line x1="240" y1="215" x2="330" y2="215"/>
    <line x1="510" y1="215" x2="600" y2="215"/>
  </g>

  <!-- Row 3: Distortion -->
  <g fill="none" stroke="currentColor" stroke-width="1">
    <rect x="60"  y="260" width="180" height="40"/>
    <rect x="330" y="260" width="180" height="40"/>
    <rect x="600" y="260" width="180" height="40"/>
  </g>
  <g font-family="monospace" fill="currentColor" text-anchor="middle">
    <text x="150" y="278" font-size="10" letter-spacing="0.5">DISTORTION</text>
    <text x="150" y="292" font-size="8"  opacity="0.6">reshape to fit model</text>
    <text x="420" y="278" font-size="10" letter-spacing="0.5">PREFRONTAL RECON</text>
    <text x="420" y="292" font-size="8"  opacity="0.6">cognitive dissonance · ACC</text>
