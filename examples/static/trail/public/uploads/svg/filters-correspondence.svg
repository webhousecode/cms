  <g stroke="#e8a87c" stroke-width="1" stroke-dasharray="2,2">
    <line x1="240" y1="280" x2="330" y2="280"/>
    <line x1="510" y1="280" x2="600" y2="280"/>
  </g>

  <!-- Caption -->
  <text x="420" y="55" font-family="monospace" font-size="11" fill="currentColor" text-anchor="middle" opacity="0.55" letter-spacing="1.5">THE SAME SHAPE, THREE VOCABULARIES</text>

  <!-- Sub-caption below -->
  <text x="420" y="335" font-family="monospace" font-size="9" fill="currentColor" text-anchor="middle" opacity="0.4">two billion years of evolution converged on this pattern</text>
</svg>
