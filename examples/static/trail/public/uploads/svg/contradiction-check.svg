<svg viewBox="20 30 800 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Two sources with contradicting claims meet at a contradiction check, routed to curator for resolution">
  <!-- SOURCE A (upper left) -->
  <g fill="none" stroke="currentColor" stroke-width="1.2">
    <rect x="50" y="110" width="170" height="80"/>
  </g>
  <g stroke="currentColor" stroke-width="0.5" opacity="0.5">
    <line x1="65" y1="135" x2="205" y2="135"/>
    <line x1="65" y1="148" x2="195" y2="148"/>
    <line x1="65" y1="161" x2="200" y2="161"/>
    <line x1="65" y1="174" x2="180" y2="174"/>
  </g>
  <text x="65" y="128" font-family="monospace" font-size="9" fill="currentColor" font-weight="bold" letter-spacing="0.5">SOURCE · A</text>
  <circle cx="205" cy="150" r="4" fill="currentColor"/>
  <text x="135" y="207" font-family="monospace" font-size="8" fill="currentColor" text-anchor="middle" opacity="0.7">claim: "X is true"</text>

  <!-- SOURCE B (lower left) -->
  <g fill="none" stroke="currentColor" stroke-width="1.2">
    <rect x="50" y="240" width="170" height="80"/>
  </g>
  <g stroke="currentColor" stroke-width="0.5" opacity="0.5">
    <line x1="65" y1="265" x2="195" y2="265"/>
    <line x1="65" y1="278" x2="205" y2="278"/>
    <line x1="65" y1="291" x2="185" y2="291"/>
    <line x1="65" y1="304" x2="200" y2="304"/>
  </g>
  <text x="65" y="258" font-family="monospace" font-size="9" fill="currentColor" font-weight="bold" letter-spacing="0.5">SOURCE · B</text>
  <circle cx="205" cy="280" r="4" fill="currentColor"/>
  <text x="135" y="337" font-family="monospace" font-size="8" fill="currentColor" text-anchor="middle" opacity="0.7">claim: "X is false"</text>

  <!-- Converging paths to contradiction node -->
  <g stroke="currentColor" stroke-width="0.9" fill="none" opacity="0.65">
    <path d="M 210 150 Q 330 160 420 205"/>
    <path d="M 210 280 Q 330 270 420 225"/>
  </g>

  <!-- Contradiction alert node (amber, central) -->
  <polygon points="420,185 455,240 385,240" fill="none" stroke="#e8a87c" stroke-width="1.8"/>
  <text x="420" y="225" font-family="monospace" font-size="18" fill="#e8a87c" text-anchor="middle" font-weight="bold">!</text>
  <circle cx="420" cy="215" r="45" fill="none" stroke="#e8a87c" stroke-width="0.5" opacity="0.35"/>
  <circle cx="420" cy="215" r="62" fill="none" stroke="#e8a87c" stroke-width="0.3" opacity="0.2"/>

  <text x="420" y="265" font-family="monospace" font-size="9" fill="#e8a87c" text-anchor="middle" font-weight="bold" letter-spacing="0.5">CONTRADICTION</text>
  <text x="420" y="277" font-family="monospace" font-size="8" fill="currentColor" text-anchor="middle" opacity="0.55">background lint</text>

  <!-- Path from contradiction to curator -->
  <line x1="465" y1="215" x2="560" y2="215" stroke="currentColor" stroke-width="0.9" opacity="0.65"/>
  <polygon points="562,215 554,211 554,219" fill="currentColor" opacity="0.65"/>

  <!-- Curator (right) -->
  <g fill="none" stroke="currentColor" stroke-width="1.2">
    <rect x="580" y="170" width="170" height="90"/>
  </g>
  <g stroke="currentColor" stroke-width="0.5" opacity="0.5">
    <line x1="595" y1="195" x2="725" y2="195"/>
    <line x1="595" y1="208" x2="710" y2="208"/>
    <line x1="595" y1="221" x2="720" y2="221"/>
    <line x1="595" y1="234" x2="700" y2="234"/>
    <line x1="595" y1="247" x2="715" y2="247"/>
  </g>
  <text x="595" y="188" font-family="monospace" font-size="9" fill="currentColor" font-weight="bold" letter-spacing="0.5">CURATOR · resolves</text>
  <!-- amber checkmark -->
  <g stroke="#e8a87c" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M 732 242 L 738 248 L 748 236"/>
  </g>

  <!-- Caption -->
  <text x="420" y="65" font-family="monospace" font-size="11" fill="currentColor" text-anchor="middle" opacity="0.55" letter-spacing="1.5">COGNITIVE DISSONANCE, MECHANISED</text>
  <text x="420" y="80" font-family="monospace" font-size="9"  fill="currentColor" text-anchor="middle" opacity="0.4">the Neurons encode not just what is known, but what is contested</text>
</svg>
