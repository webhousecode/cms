name: Build cms-builder image (F144)

on:
  push:
    branches: [main]
    paths:
      - "packages/cms-admin/builder/**"
      - ".github/workflows/cms-builder.yml"
  workflow_dispatch:
    inputs:
      no_cache:
        description: "Build without cache"
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

concurrency:
  group: cms-builder-image
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build & push cms-builder to GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push cms-builder
        uses: docker/build-push-action@v5
        with:
          context: packages/cms-admin/builder
          file: packages/cms-admin/builder/Dockerfile
          push: true
          tags: |
            ghcr.io/webhousecode/cms-builder:latest
            ghcr.io/webhousecode/cms-builder:${{ github.sha }}
          # F144 only runs the builder image inside Fly Machines (linux/amd64).
          # Skip arm64 to halve build time + image size on GHCR.
          platforms: linux/amd64
          no-cache: ${{ inputs.no_cache || false }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "## cms-builder published" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/webhousecode/cms-builder:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/webhousecode/cms-builder:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Used by F144 ephemeral SSR builds (Fly Machines pull this image to build sites)." >> $GITHUB_STEP_SUMMARY
