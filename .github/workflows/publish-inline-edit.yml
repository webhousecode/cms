name: Publish @broberg/cms-inline-edit

# Independent from publish.yml's @webhouse/* lockstep release train — this
# package has its own npm scope/org (@broberg) and its own version track.
# See docs/features/F157-inline-editing.md.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.1.1)"
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump version
        run: |
          cd packages/cms-inline-edit
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json', 'utf-8'));
            p.version = '${{ github.event.inputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "

      - name: Build
        run: pnpm --filter @broberg/cms-inline-edit build

      - name: Publish
        run: |
          cd packages/cms-inline-edit
          npm publish --access public --provenance

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/cms-inline-edit/package.json
          git commit -m "chore(cms-inline-edit): release v${{ github.event.inputs.version }}" || echo "No changes to commit"
          git push
