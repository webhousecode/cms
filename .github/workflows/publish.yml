name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump (patch, minor, major, or exact like 0.2.0)"
        required: true
        default: "patch"
  # F160: a git tag `cms-chat-client-v<ver>` triggers the token-free OIDC publish
  # of @broberg/cms-chat-client ONLY (see publish-cms-chat-client-oidc below).
  push:
    tags:
      - "cms-chat-client-v*"

permissions:
  contents: write
  id-token: write

jobs:
  # Fleet publish — MANUAL ONLY. The `if` guard keeps a `cms-chat-client-v*` tag
  # push from re-publishing the whole fleet (that path is the OIDC job below).
  publish:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Pin npm to 11.5.1 (npm 12 breaks `npm publish --provenance`)
        run: npm install -g npm@11.5.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build publishable packages
        run: pnpm build --filter='!@webhouse/cms-admin' --filter='!@webhouse/cms-example-blog'

      - name: Run tests
        run: pnpm test:run || echo "⚠️ Tests with native modules skipped on CI"

      - name: Bump versions
        run: |
          VERSION="${{ github.event.inputs.version }}"

          # If exact version (contains a dot), use it directly
          if [[ "$VERSION" == *.* ]]; then
            NEW_VERSION="$VERSION"
          else
            # Get current version from core package
            CURRENT=$(node -p "require('./packages/cms/package.json').version")
            NEW_VERSION=$(node -e "
              const [major, minor, patch] = '$CURRENT'.split('.').map(Number);
              const bump = '$VERSION';
              if (bump === 'major') console.log(\`\${major+1}.0.0\`);
              else if (bump === 'minor') console.log(\`\${major}.\${minor+1}.0\`);
              else console.log(\`\${major}.\${minor}.\${patch+1}\`);
            ")
          fi

          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "Bumping all packages to $NEW_VERSION"

          PACKAGES=(cms cms-ai cms-cli cms-mcp-client cms-mcp-server create-cms cms-admin-cli cms-shop cms-inline-edit cms-chat-client)
          for pkg in "${PACKAGES[@]}"; do
            node -e "
              const fs = require('fs');
              const path = './packages/$pkg/package.json';
              const p = JSON.parse(fs.readFileSync(path, 'utf-8'));
              p.version = '$NEW_VERSION';
              // Replace workspace:* with ^version for publish
              if (p.dependencies) {
                for (const [k,v] of Object.entries(p.dependencies)) {
                  if (v === 'workspace:*') p.dependencies[k] = '^$NEW_VERSION';
                }
              }
              fs.writeFileSync(path, JSON.stringify(p, null, 2) + '\n');
            "
            echo "  $pkg → $NEW_VERSION"
          done

      - name: Publish packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Publish in dependency order with provenance.
          # cms-shop depends on @webhouse/cms (workspace:*) — must publish AFTER cms.
          PACKAGES=(cms cms-ai cms-mcp-client cms-mcp-server cms-cli create-cms cms-shop cms-inline-edit cms-chat-client)
          for pkg in "${PACKAGES[@]}"; do
            PKG_NAME=$(node -p "require('./packages/$pkg/package.json').name")
            echo "📦 Publishing $PKG_NAME@${{ env.NEW_VERSION }}..."
            cd packages/$pkg
            npm publish --access public --provenance
            cd ../..
            echo "✅ $PKG_NAME published"
          done

      - name: Restore workspace deps and commit version bump
        run: |
          PACKAGES=(cms-ai cms-cli cms-mcp-client cms-mcp-server create-cms cms-shop)
          for pkg in "${PACKAGES[@]}"; do
            node -e "
              const fs = require('fs');
              const path = './packages/$pkg/package.json';
              const p = JSON.parse(fs.readFileSync(path, 'utf-8'));
              if (p.dependencies) {
                for (const [k,v] of Object.entries(p.dependencies)) {
                  if (k.startsWith('@webhouse/')) p.dependencies[k] = 'workspace:*';
                }
              }
              fs.writeFileSync(path, JSON.stringify(p, null, 2) + '\n');
            "
          done

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/*/package.json
          git commit -m "chore: release v${{ env.NEW_VERSION }}" || echo "No changes to commit"
          git tag "v${{ env.NEW_VERSION }}"
          git pull --rebase origin main
          git push && git push --tags

  # F160.1: token-free OIDC publish of @broberg/cms-chat-client, triggered by a
  # `cms-chat-client-v<ver>` tag. No NPM_TOKEN — npm >=11.5.1 does the OIDC
  # token exchange itself against the package's Trusted Publisher (repo
  # webhousecode/cms, workflow publish.yml, env blank). NO `environment:` here —
  # the TP was configured with a blank environment, so a named one would fail
  # the OIDC claim match.
  publish-cms-chat-client-oidc:
    if: startsWith(github.ref, 'refs/tags/cms-chat-client-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Pin npm to 11.5.1 (npm 12 breaks --provenance; 11.5.1 does OIDC exchange)
        run: npm install -g npm@11.5.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter @broberg/cms-chat-client build

      - name: Guard — tag matches package.json version
        working-directory: packages/cms-chat-client
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#cms-chat-client-v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::tag cms-chat-client-v$TAG does not match version $PKG"
            exit 1
          fi

      - name: Guard — version not already on npm
        working-directory: packages/cms-chat-client
        run: |
          PKG=$(node -p "require('./package.json').version")
          if npm view "@broberg/cms-chat-client@$PKG" version >/dev/null 2>&1; then
            echo "::error::@broberg/cms-chat-client@$PKG already published — bump the version first."
            exit 1
          fi
          echo "Publishing @broberg/cms-chat-client@$PKG"

      - name: Publish (OIDC, token-free)
        working-directory: packages/cms-chat-client
        run: npm publish --access public --provenance
